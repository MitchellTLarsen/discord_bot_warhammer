name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: ruff check .

      - name: Check syntax
        run: python -m py_compile bot.py cogs/army.py services/*.py utils/*.py models/*.py views/*.py

      - name: Test imports
        run: |
          python -c "from services.loader import load_factions; print(f'Loaded {len(load_factions())} factions')"
